# Enable AndroidX support for all dependencies (required for Glance, WorkManager, and standard AndroidX libraries)
android.useAndroidX=true

# Automatically convert third-party libraries using AndroidX dependencies
android.enableJetifier=true

# Optimize build speed by enabling parallel runs and caching
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
